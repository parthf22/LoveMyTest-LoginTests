# ============================================================
#  LoveMyTest Login Tests — CI/CD Pipeline
#  Framework: Playwright · Node.js
#  Trigger:   Push / PR to main branch + Manual dispatch
#  Created:   23 July 2026
# ============================================================

name: 🧪 Playwright E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:           # Manual trigger from GitHub UI

# Cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: 🔬 Run E2E Tests (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── Checkout Code ──────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── Setup Node.js ──────────────────────────────────
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # ── Install Dependencies ───────────────────────────
      - name: 📦 Install dependencies
        run: npm ci

      # ── Install Playwright Browsers ────────────────────
      - name: 🌐 Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # ── Run Playwright Tests ───────────────────────────
      - name: ▶️ Run Playwright tests
        run: npx playwright test --project=chromium
        env:
          CI: true

      # ── Upload Test Results JSON ───────────────────────
      - name: 📊 Upload test results (JSON)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-json
          path: reports/test-results.json
          retention-days: 30

      # ── Upload HTML Report ─────────────────────────────
      - name: 📄 Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-html
          path: reports/test-report.html
          retention-days: 30

      # ── Upload PDF Report ──────────────────────────────
      - name: 🖨️ Upload PDF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-pdf
          path: reports/test-report.pdf
          retention-days: 30

      # ── Upload Playwright HTML Report ──────────────────
      - name: 🎭 Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # ── Upload Screenshots ─────────────────────────────
      - name: 📸 Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: screenshots/
          retention-days: 30

      # ── Upload Traces (on failure) ─────────────────────
      - name: 🔍 Upload test traces (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-traces
          path: test-results/
          retention-days: 30

      # ── Summary ────────────────────────────────────────
      - name: 📋 Test run summary
        if: always()
        run: |
          echo "## 🧪 Test Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Workflow** | Playwright E2E Tests |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered By** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Runner** | ubuntu-latest |" >> $GITHUB_STEP_SUMMARY
          echo "| **Browser** | Chromium |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📄 Download the **test-report-pdf** artifact for the full report." >> $GITHUB_STEP_SUMMARY
